<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولّد الكاروسيل — حمد الفيلكاوي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --text: #f0f0f0;
      --muted: #888;
      --success: #22c55e;
      --warn: #f59e0b;
      --sheets: #1a7340;
      --sheets-hover: #22c55e;
    }

    body {
      font-family: 'Segoe UI', Tahoma, 'Arial', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 80px;
    }

    header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
    header h1 {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    header p { color: var(--muted); font-size: 0.95rem; }

    .container { max-width: 680px; margin: 0 auto; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
    }

    label {
      display: block; font-size: 0.85rem; color: var(--muted);
      margin-bottom: 8px; font-weight: 600;
    }

    input[type="text"] {
      width: 100%; background: #111; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-size: 1rem; font-family: inherit; direction: rtl;
      transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #444; }

    select {
      width: 100%; background: #111; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-size: 0.95rem; font-family: inherit; direction: rtl;
      transition: border-color 0.2s; outline: none; cursor: pointer;
      appearance: none;
    }
    select:focus { border-color: var(--accent); }
    select option { background: #1a1a1a; }

    .field { margin-bottom: 18px; }

    .pattern-tag {
      display: inline-block; font-size: 0.78rem; padding: 3px 10px;
      border-radius: 20px; background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.3); color: #93c5fd;
      margin-bottom: 16px;
    }

    .btn-generate {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      border: none; border-radius: 12px; color: #fff;
      font-size: 1.1rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-generate:hover { opacity: 0.9; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Corrections badge */
    .corrections-badge {
      display: none; margin-top: 12px; padding: 10px 14px;
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px; font-size: 0.83rem; color: var(--warn);
      cursor: pointer; text-align: center; transition: all 0.2s;
    }
    .corrections-badge.show { display: block; }
    .corrections-badge:hover { background: rgba(245,158,11,0.18); }

    /* Loading */
    .loading { display: none; text-align: center; padding: 40px 0; }
    .loading.show { display: block; }
    .spinner {
      width: 44px; height: 44px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.95rem; }

    /* Error */
    .error-box {
      display: none; background: #2d1515; border: 1px solid #7f1d1d;
      border-radius: 12px; padding: 16px 20px; color: #fca5a5;
      font-size: 0.9rem; margin-bottom: 20px; direction: rtl;
    }
    .error-box.show { display: block; }

    /* Results */
    #results { display: none; }
    #results.show { display: block; }

    .topic-title {
      text-align: center; font-size: 1.3rem; font-weight: 700;
      margin-bottom: 24px; padding: 16px;
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(59,130,246,0.15));
      border: 1px solid rgba(124,58,237,0.3); border-radius: 12px;
    }

    .slides-grid { display: grid; gap: 16px; }

    .slide-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
      transition: border-color 0.2s;
    }
    .slide-card.corrected { border-color: rgba(34,197,94,0.4); }

    .slide-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }

    .slide-badge {
      font-size: 0.8rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
    }
    .badge-hook    { background: rgba(234,179,8,0.15);  color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }
    .badge-content { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
    .badge-cta     { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

    .slide-num { font-size: 0.78rem; color: var(--muted); }

    /* Slide text — toggles between view and edit */
    .slide-text {
      font-size: 1rem; line-height: 1.75;
      white-space: pre-wrap; direction: rtl;
      margin-bottom: 12px;
    }

    .slide-textarea {
      display: none; width: 100%; min-height: 120px;
      background: #111; border: 1px solid var(--accent);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text); font-size: 0.97rem;
      font-family: inherit; line-height: 1.75;
      direction: rtl; resize: vertical; outline: none;
      margin-bottom: 12px;
    }

    .slide-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .btn-sm {
      padding: 6px 14px; border-radius: 8px; font-size: 0.8rem;
      font-family: inherit; cursor: pointer; border: 1px solid var(--border);
      background: #222; color: var(--muted); transition: all 0.2s;
    }
    .btn-sm:hover { color: var(--text); border-color: #444; }
    .btn-edit:hover  { border-color: var(--accent2); color: var(--accent2); }
    .btn-save  { border-color: rgba(34,197,94,0.4); color: var(--success); display: none; }
    .btn-save:hover  { background: rgba(34,197,94,0.1); }
    .btn-cancel { display: none; }

    .saved-mark {
      font-size: 0.78rem; color: var(--success);
      display: none; align-items: center; gap: 4px;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;
    }
    .bottom-bar button {
      flex: 1; padding: 13px; border-radius: 12px;
      font-size: 0.92rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-copy-all {
      background: #1a1a1a; border: 1px solid var(--border); color: var(--text);
    }
    .btn-copy-all:hover { border-color: var(--accent); color: var(--accent2); }
    .btn-clear-corrections {
      background: transparent; border: 1px solid #3a2a2a; color: #666;
      font-size: 0.8rem !important; flex: 0 0 auto; padding: 13px 16px !important;
    }
    .btn-clear-corrections:hover { border-color: #7f1d1d; color: #fca5a5; }

    .btn-sheets {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      font-size: 0.92rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
      background: rgba(26,115,64,0.15);
      border: 1px solid rgba(34,197,94,0.35);
      color: #4ade80;
    }
    .btn-sheets:hover { background: rgba(26,115,64,0.28); border-color: #4ade80; }
    .btn-sheets:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Sheets URL modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 28px; width: 100%; max-width: 500px;
    }
    .modal h3 { margin-bottom: 8px; font-size: 1.1rem; }
    .modal p  { color: var(--muted); font-size: 0.85rem; margin-bottom: 18px; line-height: 1.6; }
    .modal input {
      width: 100%; background: #111; border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-size: 0.88rem; font-family: inherit; direction: ltr;
      outline: none; margin-bottom: 14px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btns button {
      padding: 9px 20px; border-radius: 9px; font-size: 0.88rem;
      font-family: inherit; cursor: pointer; border: 1px solid var(--border);
    }
    .modal-confirm {
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      color: #fff; border-color: transparent;
    }
    .modal-cancel { background: #222; color: var(--muted); }

    @media (max-width: 480px) {
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 مولّد الكاروسيل</h1>
      <p>@hamad_failakawi — كاروسيل إنستقرام أسبوعي بضغطة زر</p>
    </header>

    <div class="card">
      <div class="field">
        <label>الموضوع (اختياري)</label>
        <input type="text" id="topicInput"
          placeholder="مثال: قانون الجذب، الإنتاجية، الوعي الذاتي..." />
      </div>
      <div class="field">
        <label>نمط الكفر (اختياري — افتراضي: عشوائي)</label>
        <select id="patternSelect">
          <option value="">🎲 عشوائي (موصى به)</option>
          <option value="personal_story">📖 قصة شخصية</option>
          <option value="shocking_fact">💥 معلومة صادمة</option>
          <option value="direct_challenge">🎯 تحدي مباشر للقارئ</option>
          <option value="before_after">⚡ قبل وبعد</option>
          <option value="controversial_opinion">🔥 رأي مخالف للتيار</option>
        </select>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generate()">
        ✨ ولّد كاروسيل هذا الأسبوع
      </button>
      <div class="corrections-badge" id="correctionsBadge" onclick="showCorrectionsInfo()">
        🧠 <span id="correctionsCount">0</span> تصحيح محفوظ — Claude يتعلم أسلوبك
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>جاري توليد المحتوى...</p>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div id="results">
      <div class="topic-title" id="topicTitle"></div>
      <div class="slides-grid" id="slidesGrid"></div>
      <div class="bottom-bar">
        <button class="btn-copy-all" onclick="copyAll()">📋 نسخ كل الكاروسيل</button>
        <button class="btn-sheets" id="sheetsBtn" onclick="sendToSheets()">📊 نقل إلى Sheets</button>
        <button class="btn-clear-corrections" id="clearBtn"
          onclick="clearCorrections()" style="display:none">🗑 مسح التصحيحات</button>
      </div>
    </div>
  </div>

  <!-- Sheets URL Modal -->
  <div class="modal-overlay" id="sheetsModal">
    <div class="modal">
      <h3>📊 إعداد Google Sheets</h3>
      <p>
        لازم تنشر Apps Script أول مرة فقط.<br>
        اتبع الخطوات في ملف <code>docs/apps_script.js</code> ثم الصق الـ URL هنا.
      </p>
      <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec" />
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">إلغاء</button>
        <button class="modal-confirm" onclick="confirmSendToSheets()">إرسال ✓</button>
      </div>
    </div>
  </div>

  <script>
    const BADGE = {
      hook:    ['🎯 كفر',   'badge-hook'],
      content: ['💡 محتوى','badge-content'],
      cta:     ['📣 CTA',  'badge-cta'],
    };

    /* ── Corrections — server-first, localStorage as fallback ── */
    let _corrections = [];   // الكاش في الذاكرة

    async function loadCorrections() {
      try {
        const res = await fetch('/api/corrections');
        if (res.ok) {
          _corrections = await res.json();
          // لو الـ array وصل صح، تجاهل localStorage القديم
        } else {
          throw new Error('server error');
        }
      } catch {
        // fallback: localStorage
        try { _corrections = JSON.parse(localStorage.getItem('hamad_corrections') || '[]'); }
        catch { _corrections = []; }
      }
      updateBadge();
    }

    function getCorrections() { return _corrections; }

    async function saveCorrection(original, corrected) {
      const entry = { original, corrected, ts: Date.now() };
      try {
        const res = await fetch('/api/corrections', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(entry),
        });
        if (res.ok) {
          // أعد التحميل من السيرفر عشان الكاش يتحدث
          await loadCorrections();
          return;
        }
      } catch { /* fallthrough */ }
      // fallback: localStorage
      _corrections = _corrections.filter(c => c.original !== original);
      _corrections.push(entry);
      _corrections = _corrections.slice(-20);
      localStorage.setItem('hamad_corrections', JSON.stringify(_corrections));
      updateBadge();
    }

    function clearCorrections() {
      if (!confirm('تحذف كل التصحيحات المحفوظة؟')) return;
      // مسح محلي فقط — الحذف من GitHub يتم يدوياً لو احتجت
      _corrections = [];
      localStorage.removeItem('hamad_corrections');
      updateBadge();
    }

    function updateBadge() {
      const list = _corrections;
      const badge = document.getElementById('correctionsBadge');
      const clearBtn = document.getElementById('clearBtn');
      if (list.length > 0) {
        document.getElementById('correctionsCount').textContent = list.length;
        badge.classList.add('show');
        clearBtn.style.display = 'block';
      } else {
        badge.classList.remove('show');
        clearBtn.style.display = 'none';
      }
    }

    function showCorrectionsInfo() {
      alert(`عندك ${_corrections.length} تصحيح محفوظ في GitHub.\nكل مرة تولّد كاروسيل، هالتصحيحات تُرسل لـ Claude عشان يتعلم أسلوبك.`);
    }

    /* ── Generate ── */
    async function generate() {
      const topic       = document.getElementById('topicInput').value.trim();
      const corrections = getCorrections();
      const pattern_id  = document.getElementById('patternSelect').value || null;

      document.getElementById('errorBox').classList.remove('show');
      document.getElementById('results').classList.remove('show');
      document.getElementById('loading').classList.add('show');
      document.getElementById('generateBtn').disabled = true;

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: topic || null, corrections, pattern_id }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `خطأ ${res.status}`);
        renderResults(data);
      } catch (err) {
        const box = document.getElementById('errorBox');
        box.textContent = '❌ ' + err.message;
        box.classList.add('show');
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('generateBtn').disabled = false;
      }
    }

    const PATTERN_LABELS = {
      personal_story:       '📖 قصة شخصية',
      shocking_fact:        '💥 معلومة صادمة',
      direct_challenge:     '🎯 تحدي مباشر',
      before_after:         '⚡ قبل وبعد',
      controversial_opinion:'🔥 رأي مخالف',
    };

    /* ── Render ── */
    function renderResults(data) {
      document.getElementById('topicTitle').textContent = '📌 ' + data.topic;

      const grid = document.getElementById('slidesGrid');
      grid.innerHTML = '';

      // أظهر تاق النمط المستخدم
      if (data.pattern_id) {
        const tag = document.createElement('div');
        tag.className = 'pattern-tag';
        tag.textContent = 'نمط الكفر: ' + (PATTERN_LABELS[data.pattern_id] || data.pattern_id);
        grid.appendChild(tag);
      }

      data.slides.forEach(slide => {
        const [label, badgeClass] = BADGE[slide.type] || ['•', 'badge-content'];
        const card = document.createElement('div');
        card.className = 'slide-card';
        card.dataset.original = slide.text;

        card.innerHTML = `
          <div class="slide-header">
            <span class="slide-badge ${badgeClass}">${label}</span>
            <span class="slide-num">سلايد ${slide.num}</span>
          </div>
          <p class="slide-text">${escHtml(slide.text)}</p>
          <textarea class="slide-textarea">${escHtml(slide.text)}</textarea>
          <div class="slide-actions">
            <button class="btn-sm btn-edit" onclick="toggleEdit(this)">✏️ تعديل</button>
            <button class="btn-sm btn-save" onclick="saveEdit(this)">✅ حفظ التصحيح</button>
            <button class="btn-sm btn-cancel" onclick="cancelEdit(this)">✕ إلغاء</button>
            <button class="btn-sm btn-copy" onclick="copySlide(this)">نسخ</button>
            <span class="saved-mark" id="saved-${slide.num}">✓ تصحيح محفوظ</span>
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
      updateBadge();
    }

    /* ── Edit controls ── */
    function toggleEdit(btn) {
      const card     = btn.closest('.slide-card');
      const textEl   = card.querySelector('.slide-text');
      const textarea = card.querySelector('.slide-textarea');
      const saveBtn  = card.querySelector('.btn-save');
      const cancelBtn= card.querySelector('.btn-cancel');

      textEl.style.display   = 'none';
      textarea.style.display = 'block';
      saveBtn.style.display  = 'inline-block';
      cancelBtn.style.display= 'inline-block';
      btn.style.display      = 'none';
      textarea.focus();
    }

    function cancelEdit(btn) {
      const card     = btn.closest('.slide-card');
      const textEl   = card.querySelector('.slide-text');
      const textarea = card.querySelector('.slide-textarea');
      const editBtn  = card.querySelector('.btn-edit');

      // أعد النص للأصلي
      textarea.value         = card.dataset.original;
      textEl.style.display   = '';
      textarea.style.display = 'none';
      btn.style.display      = 'none';
      card.querySelector('.btn-save').style.display = 'none';
      editBtn.style.display  = 'inline-block';
    }

    function saveEdit(btn) {
      const card     = btn.closest('.slide-card');
      const original = card.dataset.original;
      const textarea = card.querySelector('.slide-textarea');
      const corrected= textarea.value.trim();
      const textEl   = card.querySelector('.slide-text');

      if (!corrected || corrected === original) {
        cancelEdit(card.querySelector('.btn-cancel'));
        return;
      }

      // احفظ التصحيح (async — لا نحتاج نانتظرها عشان نحدث العرض)
      saveCorrection(original, corrected);

      // حدّث العرض
      textEl.innerHTML       = escHtml(corrected);
      textEl.style.display   = '';
      textarea.style.display = 'none';
      card.querySelector('.btn-save').style.display   = 'none';
      card.querySelector('.btn-cancel').style.display = 'none';
      card.querySelector('.btn-edit').style.display   = 'inline-block';
      card.classList.add('corrected');

      // أظهر علامة الحفظ
      const slideNum = card.querySelector('.slide-num').textContent.replace('سلايد ', '');
      const mark = document.getElementById(`saved-${slideNum}`);
      if (mark) { mark.style.display = 'inline-flex'; }
    }

    /* ── Copy ── */
    function copySlide(btn) {
      const card = btn.closest('.slide-card');
      const text = card.querySelector('.slide-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = 'نسخ', 1800);
      });
    }

    function copyAll() {
      const slides = document.querySelectorAll('.slide-text');
      const text = Array.from(slides)
        .map((el, i) => `[سلايد ${i+1}]\n${el.textContent}`)
        .join('\n\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.btn-copy-all');
        btn.textContent = '✓ تم النسخ!';
        setTimeout(() => btn.textContent = '📋 نسخ كل الكاروسيل', 2500);
      });
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Google Sheets ── */
    const SCRIPT_URL_KEY = 'hamad_script_url';

    function sendToSheets() {
      const saved = localStorage.getItem(SCRIPT_URL_KEY);
      if (saved) {
        doSendToSheets(saved);
      } else {
        document.getElementById('sheetsModal').classList.add('show');
      }
    }

    function closeModal() {
      document.getElementById('sheetsModal').classList.remove('show');
    }

    function confirmSendToSheets() {
      const url = document.getElementById('scriptUrlInput').value.trim();
      if (!url.startsWith('https://script.google.com')) {
        alert('الرابط غير صحيح — تأكد من نسخ رابط Web App الصحيح');
        return;
      }
      localStorage.setItem(SCRIPT_URL_KEY, url);
      closeModal();
      doSendToSheets(url);
    }

    async function doSendToSheets(scriptUrl) {
      const btn = document.getElementById('sheetsBtn');
      const topic = document.getElementById('topicTitle').textContent.replace('📌 ', '');

      // اجمع السلايدات الحالية (بعد أي تعديل)
      const cards = document.querySelectorAll('.slide-card');
      const slides = Array.from(cards).map((card, i) => ({
        num:  i + 1,
        type: i === 0 ? 'hook' : i === 5 ? 'cta' : 'content',
        text: card.querySelector('.slide-text').textContent,
      }));

      btn.textContent = '⏳ جاري النقل...';
      btn.disabled = true;

      try {
        const res = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ topic, slides }),
        });
        const data = await res.json();
        if (data.status === 'ok') {
          btn.textContent = '✅ تم النقل!';
          setTimeout(() => { btn.textContent = '📊 نقل إلى Sheets'; btn.disabled = false; }, 3000);
        } else {
          throw new Error(data.message || 'خطأ غير معروف');
        }
      } catch (err) {
        alert('❌ فشل النقل: ' + err.message + '\n\nتحقق من رابط Apps Script أو أعد نشره.');
        // أزل الرابط المحفوظ لو في خطأ
        localStorage.removeItem(SCRIPT_URL_KEY);
        btn.textContent = '📊 نقل إلى Sheets';
        btn.disabled = false;
      }
    }

    // تحميل التصحيحات من السيرفر عند فتح الصفحة
    loadCorrections();
  </script>
</body>
</html>
